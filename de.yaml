apiVersion: v1
kind: Service
metadata:
  name: producer-service
  namespace: orderflow
  labels:
    app: producer
    keploy-modified: "true"
spec:
  type: ClusterIP
  selector:
    app: producer
    environment: dev
    keploy-modified: "true"
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: agent
      protocol: TCP
      port: 45995
      targetPort: 45995