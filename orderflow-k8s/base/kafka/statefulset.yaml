---
# Internal service for inter-pod communication (PLAINTEXT on 29092)
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: orderflow
  labels:
    app: kafka
spec:
  clusterIP: None   # Headless for StatefulSet DNS
  selector:
    app: kafka
  ports:
    - name: internal
      port: 29092
      targetPort: 29092
---
# External service for client access from localhost (e.g. kafka-ui, CLI tools)
apiVersion: v1
kind: Service
metadata:
  name: kafka-external
  namespace: orderflow
  labels:
    app: kafka
spec:
  type: NodePort
  selector:
    app: kafka
  ports:
    - name: external
      port: 9092
      targetPort: 9092
      nodePort: 30092
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: orderflow
  labels:
    app: kafka
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      # ── Mac ARM64 (Apple Silicon) ──────────────────────────────────────────
      # confluentinc/cp-kafka:7.4.0 ships a native arm64 layer.
      nodeSelector:
        kubernetes.io/arch: arm64
      initContainers:
        # curlimages/curl is a proper multi-arch image with a working nc binary.
        # busybox:1.36 nc on ARM inside Minikube sometimes lacks -z support.
        - name: wait-for-zookeeper
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              echo "Waiting for Zookeeper..."
              until nc -z zookeeper 2181; do
                echo "Zookeeper not ready, sleeping 2s"
                sleep 2
              done
              echo "Zookeeper is ready!"
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.4.0
          ports:
            - containerPort: 29092  # Internal (PLAINTEXT)
            - containerPort: 9092   # External (PLAINTEXT_HOST)
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "168"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka
          readinessProbe:
            tcpSocket:
              port: 29092
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 29092
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
