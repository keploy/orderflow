apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: orderflow

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - ingress.yaml
  - zookeeper/statefulset.yaml
  - kafka/statefulset.yaml
  - postgres/shard1.yaml
  - postgres/shard2.yaml
  - localstack/deployment.yaml
  - producer/deployment.yaml
  - consumer/deployment.yaml
  # ── Istio service mesh ──────────────────────────────────────────────────────
  # Apply AFTER `./base/istio/install-istio.sh` has been run.
  # These CRDs require istiod to be installed in the cluster first.
  - istio/peer-authentication.yaml
  - istio/destination-rules.yaml
  - istio/virtual-services.yaml
  - istio/authorization-policies.yaml
  - telemetry.yaml
