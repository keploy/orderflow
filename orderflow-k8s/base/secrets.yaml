apiVersion: v1
kind: Secret
metadata:
  name: orderflow-secrets
  namespace: orderflow
type: Opaque
# Values are base64 encoded. To regenerate:
#   echo -n "value" | base64
# orderuser    → b3JkZXJ1c2Vy
# orderpass    → b3JkZXJwYXNz
# test         → dGVzdA==
stringData:
  POSTGRES_USER: "orderuser"
  POSTGRES_PASSWORD: "orderpass"
  POSTGRES_DB_SHARD1: "orders_shard1"
  POSTGRES_DB_SHARD2: "orders_shard2"
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
