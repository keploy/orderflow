apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: orderflow

resources:
  - ../../base

# Dev patches: scale down to 1 replica to save resources
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: producer
        namespace: orderflow
      spec:
        replicas: 1
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: consumer
        namespace: orderflow
      spec:
        replicas: 1

# Override image pull policy for local builds
images:
  - name: orderflow-producer
    newTag: latest
  - name: orderflow-consumer
    newTag: latest

commonLabels:
  environment: dev
